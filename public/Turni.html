<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Turni settimanali</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"]{
      --t-xs:clamp(.75rem,.7rem + .25vw,.875rem);--t-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --t-base:clamp(1rem,.95rem + .25vw,1.125rem);--t-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --t-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --sp2:.5rem;--sp3:.75rem;--sp4:1rem;--sp5:1.25rem;--sp6:1.5rem;--sp8:2rem;
      --bg:#f7f6f2;--surf:#f9f8f5;--surf2:#fff;--off:#edeae5;--bdr:#d4d1ca;--div:#dcd9d5;
      --tx:#28251d;--txm:#6f6d66;--txi:#f9f8f4;
      --pri:#01696f;--prih:#0c4e54;--prhl:#cedcd8;
      --ok:#437a22;--warn:#964219;--err:#a12c7b;
      --r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;
      --sh-sm:0 1px 2px rgba(40,37,29,.06);--sh-md:0 8px 24px rgba(40,37,29,.08);
      --font:'Satoshi',system-ui,sans-serif;
    }
    [data-theme="dark"]{
      --bg:#171614;--surf:#1c1b19;--surf2:#201f1d;--off:#262421;--bdr:#393836;--div:#302f2d;
      --tx:#e7e4dd;--txm:#b5b2ab;--txi:#171614;
      --pri:#4f98a3;--prih:#75b4be;--prhl:#293538;
      --ok:#7db857;--warn:#d2845f;--err:#d776b3;
      --sh-md:0 12px 32px rgba(0,0,0,.34);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;font-family:var(--font);font-size:var(--t-base);line-height:1.6;color:var(--tx);background:linear-gradient(160deg,var(--bg),var(--off))}
    button{font:inherit;color:inherit;cursor:pointer}
    table{border-collapse:collapse;width:100%}

    /* ── Page layout ── */
    .page{max-width:1360px;margin:0 auto;padding:var(--sp6) var(--sp4) var(--sp8);display:grid;gap:var(--sp6)}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:var(--sp4);flex-wrap:wrap}
    .brand{display:flex;gap:var(--sp3);align-items:center}
    .logo{width:40px;height:40px;border-radius:var(--r-lg);background:var(--surf2);border:1px solid var(--bdr);display:grid;place-items:center;color:var(--pri);flex-shrink:0;box-shadow:var(--sh-sm)}
    .brand h1{font-size:var(--t-xl);line-height:1.1;letter-spacing:-.03em}
    .brand p{color:var(--txm);font-size:var(--t-sm)}
    .theme-btn{min-width:44px;min-height:44px;border-radius:var(--r-full);border:1px solid var(--bdr);background:var(--surf2);font-size:1.1rem}
    .theme-btn:hover{background:var(--off)}

    /* ── Panel ── */
    .panel{background:color-mix(in srgb,var(--surf) 90%,transparent);border:1px solid var(--bdr);border-radius:var(--r-xl);box-shadow:var(--sh-md)}
    .pi{padding:var(--sp5)}

    /* ── Schedule header ── */
    .sched-header{padding:var(--sp5);border-bottom:1px solid var(--div);background:color-mix(in srgb,var(--prhl) 38%,var(--surf2))}
    .sched-header h2{font-size:var(--t-xl);line-height:1.2;margin-bottom:var(--sp2)}
    .sched-meta{display:flex;flex-wrap:wrap;gap:var(--sp3)}
    .meta-chip{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .75rem;border-radius:var(--r-full);background:rgba(1,105,111,.1);color:var(--pri);font-size:var(--t-sm);font-weight:700}

    /* ── Table ── */
    .sheet-scroll{overflow-x:auto}
    .schedule-table{min-width:900px}
    .schedule-table th,.schedule-table td{border-right:1px solid var(--div);border-bottom:1px solid var(--div);padding:var(--sp3);text-align:left;vertical-align:middle}
    .schedule-table thead th{position:sticky;top:0;background:var(--off);z-index:2;font-size:var(--t-sm);white-space:nowrap}
    .schedule-table thead th:first-child{position:sticky;left:0;z-index:3}
    .schedule-table tbody th{position:sticky;left:0;background:var(--surf2);z-index:1;min-width:180px}
    .schedule-table tbody tr:nth-child(even) th,
    .schedule-table tbody tr:nth-child(even) td{background:color-mix(in srgb,var(--off) 35%,var(--surf2))}
    .schedule-table tbody tr:nth-child(even) th{background:color-mix(in srgb,var(--off) 50%,var(--surf2))}
    .num{text-align:center;font-weight:700;font-variant-numeric:tabular-nums;min-width:72px}

    /* ── Shift badges ── */
    .badge{display:inline-flex;align-items:center;justify-content:center;padding:.3rem .65rem;border-radius:var(--r-full);font-size:var(--t-sm);font-weight:700;white-space:nowrap}
    .sp{background:rgba(67,122,34,.13);color:var(--ok)}
    .sc{background:rgba(150,66,25,.13);color:var(--warn)}
    .sb{background:rgba(1,105,111,.13);color:var(--pri)}
    .sd{background:rgba(122,121,116,.12);color:var(--txm)}

    /* ── ICS button in name cell ── */
    .emp-name-wrap{display:flex;flex-direction:column;gap:var(--sp2)}
    .emp-name{font-weight:700}
    .ics-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .65rem;font-size:.78rem;font-weight:700;border-radius:var(--r-full);border:1px solid var(--bdr);background:var(--surf2);color:var(--pri);white-space:nowrap;width:fit-content}
    .ics-btn:hover{background:var(--prhl);border-color:var(--pri)}

    /* ── Legend ── */
    .legend{display:flex;flex-wrap:wrap;gap:var(--sp2);margin-top:var(--sp4)}

    /* ── States ── */
    .state{display:grid;place-items:center;gap:var(--sp3);min-height:260px;padding:var(--sp8);text-align:center;color:var(--txm)}
    .state svg{width:52px;height:52px;color:var(--txm)}
    .loader{display:inline-block;width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Print ── */
    @page{size:A4 landscape;margin:10mm 8mm}
    @media print{
      .topbar,.legend,.theme-btn,.ics-btn{display:none!important}
      body{background:#fff}
      .page{padding:0}
      .panel{box-shadow:none;border:none}
      .sched-header{background:#e8f2f0!important}
      .sheet-scroll{overflow:visible}
      .schedule-table{min-width:0;width:100%;font-size:7.5pt;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      .schedule-table th,.schedule-table td{white-space:normal;word-break:break-word;padding:3pt 4pt;border:.5pt solid #bbb;position:static!important;background:transparent!important;z-index:auto!important}
      .schedule-table thead th{background:#ebebeb!important;font-size:6.5pt}
      .schedule-table tbody tr:nth-child(even) th,
      .schedule-table tbody tr:nth-child(even) td{background:#eef2ee!important}
      .schedule-table tbody tr:nth-child(odd) th,
      .schedule-table tbody tr:nth-child(odd) td{background:#fff!important}
      .num{background:#f0f7f0!important;font-weight:700}
    }

    @media(max-width:640px){.schedule-table{min-width:680px}.pi{padding:var(--sp4)}}
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="10" y="12" width="44" height="40" rx="9"/><path d="M21 24h22M21 32h14M21 40h22"/><line x1="45" y1="18" x2="45" y2="44"/>
          </svg>
        </div>
        <div>
          <h1>Turni settimanali</h1>
          <p>Visualizza i tuoi turni e aggiungili al calendario del tuo telefono</p>
        </div>
      </div>
      <button class="theme-btn" id="themeBtn" aria-label="Cambia tema">☼</button>
    </header>

    <main>
      <div class="panel" id="mainPanel">
        <div class="state" id="loadingState">
          <div class="loader"></div>
          <p>Caricamento turni…</p>
        </div>
      </div>
    </main>
  </div>

  <script>
  (() => {
    const DAYS_IT = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
    const CLS     = { 'Pranzo':'sp', 'Cena':'sc', 'Pranzo e cena':'sb', 'Dayoff':'sd' };
    const ICS_TIMES = {
      'Pranzo':        [{ s:'113000', e:'150000', label:'Turno Pranzo 🍽' }],
      'Cena':          [{ s:'180000', e:'233000', label:'Turno Cena 🌙' }],
      'Pranzo e cena': [{ s:'113000', e:'150000', label:'Turno Pranzo 🍽' },
                        { s:'180000', e:'233000', label:'Turno Cena 🌙' }],
    };

    const root     = document.documentElement;
    const themeBtn = document.getElementById('themeBtn');
    const panel    = document.getElementById('mainPanel');

    /* ── Theme ── */
    const setTheme = t => {
      root.setAttribute('data-theme', t);
      themeBtn.textContent = t === 'dark' ? '☾' : '☼';
    };
    setTheme(matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
    themeBtn.addEventListener('click', () =>
      setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    /* ── Helpers ── */
    const fmt = d => new Intl.DateTimeFormat('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}).format(d);
    const parseDate = v => new Date(v + 'T00:00:00');
    const iso = d => new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,10);
    const range = (s, e) => {
      const dates = []; const c = new Date(s);
      while (c <= e) { dates.push(new Date(c)); c.setDate(c.getDate()+1); }
      return dates;
    };

    /* ── ICS generator ── */
    const generateICS = (empName, shifts, scheduleId) => {
      const pageUrl = `${window.location.origin}/turni?id=${scheduleId}`;
      const lines = [
        'BEGIN:VCALENDAR','VERSION:2.0',
        'PRODID:-//Gestore Turni Settimanali//IT',
        'CALSCALE:GREGORIAN','METHOD:PUBLISH',
      ];
      Object.entries(shifts).forEach(([date, type]) => {
        if (type === 'Dayoff' || !ICS_TIMES[type]) return;
        const d = date.replace(/-/g,'');
        ICS_TIMES[type].forEach(ev => {
          const uid = `${d}${ev.s}-${empName.replace(/[^a-z0-9]/gi,'')}@gestoreturni`;
          lines.push(
            'BEGIN:VEVENT',
            `DTSTART;TZID=Europe/Rome:${d}T${ev.s}`,
            `DTEND;TZID=Europe/Rome:${d}T${ev.e}`,
            `SUMMARY:${ev.label} — ${empName}`,
            `DESCRIPTION:${type}\nTabella turni: ${pageUrl}`,
            `URL:${pageUrl}`,
            `UID:${uid}`,
            'STATUS:CONFIRMED',
            'END:VEVENT'
          );
        });
      });
      // Evento informativo con link
      const firstDate = Object.keys(shifts)[0]?.replace(/-/g,'') || '19700101';
      lines.push(
        'BEGIN:VEVENT',
        `DTSTART;VALUE=DATE:${firstDate}`,
        `DTEND;VALUE=DATE:${firstDate}`,
        `SUMMARY:📋 Tabella turni completa`,
        `DESCRIPTION:Visualizza tutti i turni su: ${pageUrl}`,
        `URL:${pageUrl}`,
        `UID:info-${scheduleId}-${empName.replace(/[^a-z0-9]/gi,'')}@gestoreturni`,
        'STATUS:CONFIRMED',
        'END:VEVENT',
        'END:VCALENDAR'
      );
      return lines.join('\r\n');
    };

    const downloadICS = (empName, shifts, scheduleId) => {
      const blob = new Blob([generateICS(empName, shifts, scheduleId)], { type:'text/calendar;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = `turni-${empName.replace(/\s+/g,'-').toLowerCase()}.ics`;
      a.click(); URL.revokeObjectURL(url);
    };

    /* ── Render schedule ── */
    const renderSchedule = (scheduleId, schedule, employees) => {
      const s     = parseDate(schedule.week_start);
      const e     = parseDate(schedule.week_end);
      const dates = range(s, e);

      // Header
      const header = document.createElement('div');
      header.className = 'sched-header';
      header.innerHTML = `
        <h2>${schedule.title}</h2>
        <div class="sched-meta">
          <span class="meta-chip">📅 Dal ${fmt(s)} al ${fmt(e)}</span>
          <span class="meta-chip">👥 ${employees.length} dipendent${employees.length===1?'e':'i'}</span>
          <span class="meta-chip">📋 ${dates.length} giorn${dates.length===1?'o':'i'}</span>
        </div>`;

      // Table
      const scroll = document.createElement('div');
      scroll.className = 'sheet-scroll';

      const tbl = document.createElement('table');
      tbl.className = 'schedule-table';
      tbl.setAttribute('aria-label', schedule.title);

      // Head
      const thead = tbl.createTHead();
      const hr    = thead.insertRow();
      ['Dipendente',
       ...dates.map(d => `${DAYS_IT[d.getDay()]}<br><span style="font-weight:400">${fmt(d)}</span>`),
       'Totale<br>pranzi ☀', 'Totale<br>cene 🌙'
      ].forEach((text, i) => {
        const th = document.createElement('th');
        th.innerHTML = text;
        if (i > dates.length) th.className = 'num';
        hr.appendChild(th);
      });

      // Body
      const tbody = tbl.createTBody();
      employees.forEach(emp => {
        const tr = tbody.insertRow();

        // Name cell with ICS button
        const nameTh = document.createElement('th');
        nameTh.innerHTML = `<div class="emp-name-wrap">
          <span class="emp-name">${emp.name}</span>
        </div>`;
        const icsBtn = document.createElement('button');
        icsBtn.className = 'ics-btn';
        icsBtn.type = 'button';
        icsBtn.innerHTML = '📅 Aggiungi al calendario';
        icsBtn.addEventListener('click', () => downloadICS(emp.name, emp.shifts, scheduleId));
        nameTh.querySelector('.emp-name-wrap').appendChild(icsBtn);
        tr.appendChild(nameTh);

        // Day cells (read-only badges)
        let pranzo = 0, cena = 0;
        dates.forEach(d => {
          const dateKey = iso(d);
          const type    = emp.shifts[dateKey] || 'Dayoff';
          if (type === 'Pranzo' || type === 'Pranzo e cena') pranzo++;
          if (type === 'Cena'   || type === 'Pranzo e cena') cena++;
          const td    = tr.insertCell();
          const badge = document.createElement('span');
          badge.className = `badge ${CLS[type] || 'sd'}`;
          badge.textContent = type;
          td.appendChild(badge);
        });

        // Totals
        const lCell = tr.insertCell(); lCell.className = 'num'; lCell.textContent = pranzo;
        const dCell = tr.insertCell(); dCell.className = 'num'; dCell.textContent = cena;
      });

      tbl.appendChild(tbody);
      scroll.appendChild(tbl);

      // Legend
      const legend = document.createElement('div');
      legend.className = 'pi';
      legend.innerHTML = `
        <div class="legend">
          <span class="badge sp">Pranzo (11:30–15:00)</span>
          <span class="badge sc">Cena (18:00–23:30)</span>
          <span class="badge sb">Pranzo e cena</span>
          <span class="badge sd">Dayoff</span>
        </div>`;

      panel.innerHTML = '';
      panel.appendChild(header);
      panel.appendChild(scroll);
      panel.appendChild(legend);
    };

    /* ── Error state ── */
    const showError = msg => {
      panel.innerHTML = `
        <div class="state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
          </svg>
          <div><strong>Turni non trovati</strong><p>${msg}</p></div>
        </div>`;
    };

    /* ── Init ── */
    const params     = new URLSearchParams(window.location.search);
    const scheduleId = params.get('id');

    if (!scheduleId) {
      showError('Nessun ID turno specificato nell\'URL. Chiedi all\'amministratore il link corretto.');
      return;
    }

    fetch(`/api/schedules/${scheduleId}`)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        // normalizza shifts: { date: type }
        data.employees.forEach(emp => {
          const flat = {};
          Object.entries(emp.shifts).forEach(([date, info]) => {
            flat[date] = typeof info === 'object' ? info.type : info;
          });
          emp.shifts = flat;
        });
        document.title = `${data.schedule.title} — Turni settimanali`;
        renderSchedule(scheduleId, data.schedule, data.employees);
      })
      .catch(err => showError(`Errore ${err}. Verifica che il link sia corretto o contatta l'amministratore.`));
  })();
  </script>
</body>
</html>
